<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eng. Shadrack Favour — API</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2.5rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; color: #f1f5f9; margin-bottom: 0.5rem; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 1.5rem; }
    .endpoints { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
    .endpoints li {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .method {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      background: #0ea5e9;
      color: #fff;
      flex-shrink: 0;
    }
    .method.post { background: #10b981; }
    code { font-family: monospace; font-size: 0.875rem; color: #7dd3fc; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Portfolio Backend API</h1>
    <p>Serverless API for Eng. Shadrack Favour's portfolio. All endpoints are available via Netlify Functions.</p>
    <ul class="endpoints">
      <li>
        <span class="method">GET</span>
        <code>/.netlify/functions/portfolio</code>
      </li>
      <li>
        <span class="method post">POST</span>
        <code>/.netlify/functions/contact</code>
      </li>
    </ul>
  </div>
</body>
</html>
